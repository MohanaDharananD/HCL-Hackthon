# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/retailhub
spring.data.mongodb.database=retailhub

# JWT
jwt.secret=RetailHubSecretKey2026SuperSecureTokenSigningKeyForJWTAuthentication
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.retailhub=DEBUG

# Mail Configuration (Dummy placeholders for testing)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-dummy-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
